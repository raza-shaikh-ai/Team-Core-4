<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmShare - Connect Surplus Produce with Communities</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="app-header">
        <div class="header-container">
            <a href="#" class="logo-wrapper" id="header-logo">
                <span class="logo-icon">🌾</span>
                <span>FarmShare</span>
            </a>
            <nav class="user-nav" id="user-nav" style="display: none;">
                <div class="user-profile">
                    <div class="avatar" id="user-avatar">-</div>
                    <div class="profile-info">
                        <span class="profile-name" id="user-name">Loading...</span>
                        <span class="profile-role" id="user-role-label">Role</span>
                    </div>
                </div>
                <button class="btn btn-secondary" id="logout-btn">Logout</button>
            </nav>
        </div>
    </header>

    <main class="main-content">

        <section id="auth-view" class="view-section active">
            <div class="auth-card">
                <div class="auth-header">
                    <h2 id="auth-title">Welcome to FarmShare</h2>
                    <p id="auth-subtitle">Login to connect surplus produce with those in need</p>
                </div>

                <form id="auth-form">
                    <div class="form-group" id="name-group" style="display: none;">
                        <label for="reg-name">Full Name</label>
                        <input type="text" id="reg-name" class="form-control" placeholder="Enter your full name">
                    </div>

                    <div class="form-group">
                        <label for="auth-email">Email Address</label>
                        <input type="email" id="auth-email" class="form-control" placeholder="name@example.com"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="auth-password">Password</label>
                        <input type="password" id="auth-password" class="form-control" placeholder="••••••••" required>
                    </div>

                    <div class="form-group" id="role-group" style="display: none;">
                        <label>Select Your Role</label>
                        <div class="role-selector">
                            <div class="role-option">
                                <input type="radio" id="role-farmer" name="user-role" value="Farmer" checked>
                                <label for="role-farmer" class="role-label">
                                    <span class="role-icon">👨‍🌾</span>
                                    <span class="role-name">Farmer</span>
                                </label>
                            </div>
                            <div class="role-option">
                                <input type="radio" id="role-ngo" name="user-role" value="NGO">
                                <label for="role-ngo" class="role-label">
                                    <span class="role-icon">🏢</span>
                                    <span class="role-name">NGO / Food Bank</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.85rem;"
                        id="auth-submit-btn">Login</button>
                </form>

                <div class="auth-footer">
                    <span id="auth-toggle-text">Don't have an account?</span>
                    <a href="#" id="auth-toggle-link">Register here</a>
                </div>
            </div>
        </section>

        <section id="otp-view" class="view-section">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>Verify Your Email</h2>
                    <p>We've sent a 6-digit OTP code to your registered email address.</p>
                </div>

                <form id="otp-form">
                    <input type="hidden" id="otp-email">

                    <div class="form-group">
                        <label for="otp-code">One-Time Password (OTP)</label>
                        <input type="text" id="otp-code" class="form-control" placeholder="123456" minlength="6"
                            maxlength="6" pattern="\d{6}" required>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.85rem;"
                        id="otp-submit-btn">Verify Code</button>
                </form>

                <div class="auth-footer">
                    <a href="#" id="otp-back-link">Back to Login</a>
                </div>
            </div>
        </section>

        <section id="farmer-view" class="view-section">
            <div class="dashboard-layout">
                <aside class="dashboard-sidebar">
                    <div class="panel-card">
                        <h3 class="panel-title">🌾 Share Surplus</h3>
                        <form id="upload-produce-form">
                            <div class="form-group">
                                <label for="produce-name">Produce Name</label>
                                <input type="text" id="produce-name" class="form-control"
                                    placeholder="e.g. Tomatoes, Potatoes" required>
                            </div>

                            <div class="form-group">
                                <label for="produce-quantity">Quantity (kg)</label>
                                <input type="number" id="produce-quantity" step="0.1" class="form-control"
                                    placeholder="e.g. 50" required>
                            </div>

                            <div class="form-group">
                                <label for="produce-date">Harvest Date</label>
                                <input type="date" id="produce-date" class="form-control" required>
                            </div>

                            <div class="form-group">
                                <label for="produce-location">Pickup Location</label>
                                <input type="text" id="produce-location" class="form-control" placeholder="City, Area"
                                    required>
                            </div>

                            <div class="form-group">
                                <label>Produce Image (Optional)</label>
                                <div class="file-upload-wrapper">
                                    <span>Click to upload image</span>
                                    <input type="file" id="produce-image-file" class="file-upload-input"
                                        accept="image/*">
                                    <input type="hidden" id="produce-image-url">
                                </div>
                                <img id="image-upload-preview" class="file-upload-preview" alt="Upload preview">
                            </div>

                            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;"
                                id="submit-produce-btn">Submit Listing</button>
                        </form>
                    </div>
                </aside>

                <div class="dashboard-main">
                    <div class="tabs-nav">
                        <button class="tab-btn active" id="tab-farmer-listings">My Listings</button>
                        <button class="tab-btn" id="tab-farmer-requests">Incoming Requests</button>
                        <button class="tab-btn" id="tab-farmer-history">📦 History</button>
                    </div>

                    <div id="farmer-listings-tab-content">
                        <div class="produce-grid" id="farmer-produce-list"></div>
                    </div>

                    <div id="farmer-requests-tab-content" style="display: none;">
                        <div class="produce-grid" id="farmer-requests-list"></div>
                    </div>

                    <div id="farmer-history-tab-content" style="display: none;">
                        <div class="produce-grid" id="farmer-history-list"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="ngo-view" class="view-section">
            <div class="dashboard-main">
                <div class="filter-bar">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label for="filter-name">Produce Name</label>
                        <input type="text" id="filter-name" class="form-control" placeholder="Search produce...">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label for="filter-location">Location</label>
                        <input type="text" id="filter-location" class="form-control" placeholder="Search location...">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label for="filter-status">Status</label>
                        <select id="filter-status" class="form-control">
                            <option value="">All Statuses</option>
                            <option value="available" selected>Available</option>
                            <option value="requested">Requested</option>
                            <option value="pickup_scheduled">Pickup Scheduled</option>
                            <option value="delivered">Delivered</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" id="apply-filters-btn">Search</button>
                </div>

                <div class="tabs-nav" style="margin-top: 1.5rem;">
                    <button class="tab-btn active" id="tab-ngo-browse">Browse Produce</button>
                    <button class="tab-btn" id="tab-ngo-requests">My Requests</button>
                    <button class="tab-btn" id="tab-ngo-history">📦 History</button>
                </div>

                <div id="ngo-browse-tab-content">
                    <div class="produce-grid" id="ngo-produce-list"></div>
                </div>

                <div id="ngo-requests-tab-content" style="display: none;">
                    <div class="produce-grid" id="ngo-requests-list"></div>
                </div>

                <div id="ngo-history-tab-content" style="display: none;">
                    <div class="produce-grid" id="ngo-history-list"></div>
                </div>
            </div>
        </section>

    </main>

    <div class="toast-container" id="toast-container"></div>

    <script src="app.js"></script>
</body>

</html>
